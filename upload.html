<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VLPH Database Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 40px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-weight: 700;
      font-size: 16px;
      color: #1e293b;
    }

    header .subtitle {
      font-size: 13px;
      color: #94a3b8;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .page-sub {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 36px;
    }

    /* Upload card */
    .upload-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 32px;
    }

    .upload-card h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #0f172a;
    }

    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8fafc;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #1e40af;
      background: #eff6ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      width: 40px;
      height: 40px;
      background: #e0e7ff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 20px;
    }

    .drop-zone .drop-title {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .drop-zone .drop-sub {
      font-size: 13px;
      color: #94a3b8;
    }

    .file-selected {
      display: none;
      align-items: center;
      gap: 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 14px;
    }

    .file-selected.visible { display: flex; }

    .file-icon {
      width: 36px;
      height: 36px;
      background: #16a34a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .file-info { flex: 1; }
    .file-name { font-size: 14px; font-weight: 600; color: #1e293b; }
    .file-size { font-size: 12px; color: #64748b; margin-top: 2px; }

    .btn-remove {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
    }

    .btn-remove:hover { color: #ef4444; }

    .upload-btn {
      width: 100%;
      padding: 13px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .upload-btn:hover { background: #1e3a8a; }
    .upload-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    /* Status message */
    .status-msg {
      display: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 14px;
      font-weight: 500;
    }

    .status-msg.success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
    }

    .status-msg.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }

    .status-msg.loading {
      display: block;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
    }

    /* Tables grid */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 16px;
    }

    .tables-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .table-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .table-card:hover {
      border-color: #1e40af;
      box-shadow: 0 0 0 3px #eff6ff;
    }

    .table-card.selected {
      border-color: #1e40af;
      background: #eff6ff;
    }

    .table-card.updated {
      border-color: #16a34a;
    }

    .table-name {
      font-size: 13px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .table-hint {
      font-size: 11px;
      color: #94a3b8;
    }

    .table-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-updated {
      background: #dcfce7;
      color: #16a34a;
    }

    .badge-pending {
      background: #f1f5f9;
      color: #94a3b8;
    }

    /* Instruction bar */
    .hint-bar {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #92400e;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VLPH</div>
    <div class="subtitle">/ Database Manager</div>
  </header>

  <div class="container">
    <h1>Database Manager</h1>
    <p class="page-sub">Upload Excel files to update master tables in the VLPH database.</p>

    <!-- Upload Card -->
    <div class="upload-card">
      <h2>Upload Master Table</h2>

      <div class="hint-bar">
        💡 File name must match the table name exactly — e.g. <strong>blower_master.xlsx</strong>
      </div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".xlsx" />
        <div class="drop-icon">📊</div>
        <div class="drop-title">Drop your Excel file here</div>
        <div class="drop-sub">or click to browse &nbsp;·&nbsp; .xlsx only</div>
      </div>

      <div class="file-selected" id="fileSelected">
        <div class="file-icon">✓</div>
        <div class="file-info">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="btn-remove" onclick="clearFile()">✕</button>
      </div>

      <div class="status-msg" id="statusMsg"></div>

      <button class="upload-btn" id="uploadBtn" onclick="uploadFile()" disabled>
        Upload to Database
      </button>
    </div>

    <!-- Tables Grid -->
    <div class="section-title">Master Tables</div>

    <div class="tables-grid" id="tablesGrid"></div>
  </div>

  <script>
    const API = "http://127.0.0.1:8000/upload-excel/";

    const TABLES = [
      { id: "agr_master",              label: "AGR Master",              hint: "AGR configurations" },
      { id: "blower_master",           label: "Blower Master",           hint: "Blower specifications" },
      { id: "burner_master",           label: "Burner Master",           hint: "Burner catalogue" },
      { id: "burner_selection_master", label: "Burner Selection Master", hint: "Selection rules" },
      { id: "butterfly_valve_master",  label: "Butterfly Valve Master",  hint: "Valve sizes & prices" },
      { id: "compensator_master",      label: "Compensator Master",      hint: "Compensator data" },
      { id: "gas_train_master",        label: "Gas Train Master",        hint: "Gas train configs" },
      { id: "motorized_valve_master",  label: "Motorized Valve Master",  hint: "Motorized valve data" },
      { id: "rotary_joint_master",     label: "Rotary Joint Master",     hint: "Rotary joint specs" },
    ];

    const updatedTables = new Set();
    let selectedFile = null;

    // Render tables grid
    function renderGrid() {
      const grid = document.getElementById("tablesGrid");
      grid.innerHTML = TABLES.map(t => `
        <div class="table-card ${updatedTables.has(t.id) ? "updated" : ""}" id="card-${t.id}" onclick="selectTable('${t.id}')">
          <div class="table-name">${t.label}</div>
          <div class="table-hint">${t.id}.xlsx</div>
          <span class="table-badge ${updatedTables.has(t.id) ? "badge-updated" : "badge-pending"}">
            ${updatedTables.has(t.id) ? "Updated" : "Pending"}
          </span>
        </div>
      `).join("");
    }

    function selectTable(tableId) {
      document.querySelectorAll(".table-card").forEach(c => c.classList.remove("selected"));
      document.getElementById("card-" + tableId)?.classList.add("selected");
    }

    // File handling
    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");

    fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file || !file.name.endsWith(".xlsx")) {
        showStatus("error", "Please select a valid .xlsx file.");
        return;
      }

      selectedFile = file;
      const tableName = file.name.replace(".xlsx", "").toLowerCase();

      document.getElementById("fileName").textContent = file.name;
      document.getElementById("fileSize").textContent = (file.size / 1024).toFixed(1) + " KB";
      document.getElementById("fileSelected").classList.add("visible");
      document.getElementById("uploadBtn").disabled = false;
      clearStatus();

      // Auto-highlight matching table
      const match = TABLES.find(t => t.id === tableName);
      if (match) {
        selectTable(tableName);
      } else {
        document.querySelectorAll(".table-card").forEach(c => c.classList.remove("selected"));
        showStatus("error", `No matching table found for "${file.name}". Valid names: ${TABLES.map(t => t.id + ".xlsx").join(", ")}`);
        document.getElementById("uploadBtn").disabled = true;
      }
    }

    function clearFile(resetStatus = true) {
      selectedFile = null;
      fileInput.value = "";
      document.getElementById("fileSelected").classList.remove("visible");
      document.getElementById("uploadBtn").disabled = true;
      document.querySelectorAll(".table-card").forEach(c => c.classList.remove("selected"));
      if (resetStatus) clearStatus();
    }

    function showStatus(type, msg) {
      const el = document.getElementById("statusMsg");
      el.className = "status-msg " + type;
      el.textContent = msg;
    }

    function clearStatus() {
      const el = document.getElementById("statusMsg");
      el.className = "status-msg";
      el.textContent = "";
    }

    async function uploadFile() {
      if (!selectedFile) return;

      const btn = document.getElementById("uploadBtn");
      btn.disabled = true;
      btn.textContent = "Uploading...";
      showStatus("loading", "Uploading and updating database...");

      const formData = new FormData();
      formData.append("file", selectedFile);

      try {
        const res = await fetch(API, { method: "POST", body: formData });
        const data = await res.json();

        if (data.message) {
          const tableName = selectedFile.name.replace(".xlsx", "").toLowerCase();
          updatedTables.add(tableName);
          renderGrid();
          selectTable(tableName);
          clearFile(false);  // clear file but keep status
          showStatus("success", "✓ " + data.message);
          setTimeout(() => clearStatus(), 4000);
        } else {
          showStatus("error", "Error: " + (data.error || "Unknown error"));
        }
      } catch (err) {
        showStatus("error", "Upload failed. Is the backend running?");
      } finally {
        btn.disabled = false;
        btn.textContent = "Upload to Database";
      }
    }

    renderGrid();
  </script>
</body>
</html>
